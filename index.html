<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Viewer</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            margin: 0;
            background: #000;
            overflow: hidden;
        }

        #gl {
            width: 100%;
            height: 100%;
            display: block;
        }

        #dropzone {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 10px;
            color: #555;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 15px;
            pointer-events: none;
            text-align: center;
            transition: opacity 0.2s;
        }

        #dropzone.dragging {
            color: #4fd1c5;
        }

        #dropzone .hint {
            font-size: 12px;
            color: #3a3a3a;
        }

        #opacity {
            position: fixed;
            bottom: 14px;
            left: 14px;
            width: 140px;
            accent-color: #4fd1c5;
            opacity: 0;
            transition: opacity 0.2s;
        }

        #opacity.visible {
            opacity: 0.85;
        }

        #legend {
            position: fixed;
            bottom: 14px;
            right: 14px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            max-width: 50%;
            justify-content: flex-end;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        #legend.visible {
            opacity: 0.85;
        }

        #legend span {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 10px;
            color: #aaa;
        }

        #legend i {
            width: 8px;
            height: 8px;
            border-radius: 2px;
            display: inline-block;
        }
    </style>
</head>

<body>

    <canvas id="gl"></canvas>

    <div id="dropzone">
        <div>Upload CT scan first, then upload segmentation</div>
    </div>

    <input type="range" id="opacity" min="0" max="100" value="60" />
    <div id="legend"></div>

    <script type="module">
        import { Niivue, cmapper } from "https://unpkg.com/@niivue/niivue@0.68.2/dist/index.js";

        // LABEL MAP
        const labelMap = {
            0: { name: "Background", rgba: [0, 0, 0, 0] },
            1: { name: "Spleen", rgba: [0.902, 0.624, 0.000, 1] },
            2: { name: "Kidney (R)", rgba: [0.337, 0.706, 0.914, 1] },
            3: { name: "Kidney (L)", rgba: [0.000, 0.620, 0.451, 1] },
            4: { name: "Gallbladder", rgba: [0.941, 0.894, 0.259, 1] },
            6: { name: "Liver", rgba: [0.835, 0.369, 0.000, 1] },
            7: { name: "Stomach", rgba: [0.800, 0.475, 0.655, 1] },
            8: { name: "Aorta", rgba: [0.000, 0.447, 0.698, 1] },
            9: { name: "Postcava", rgba: [0.600, 0.600, 0.600, 1] },
            11: { name: "Pancreas", rgba: [0.498, 0.804, 0.733, 1] },
        };
        const MAX_LABEL = Math.max(...Object.keys(labelMap).map(Number));

        function rgbaToHex([r, g, b]) {
            const to255 = v => Math.round(v * 255).toString(16).padStart(2, '0');
            return `#${to255(r)}${to255(g)}${to255(b)}`;
        }

        function buildLabelColormap() {
            const R = [], G = [], B = [], A = [], I = [], labels = [];
            for (let i = 0; i <= MAX_LABEL; i++) {
                const entry = labelMap[i] || { name: "", rgba: [0, 0, 0, 0] };
                R.push(Math.round(entry.rgba[0] * 255));
                G.push(Math.round(entry.rgba[1] * 255));
                B.push(Math.round(entry.rgba[2] * 255));
                A.push(Math.round(entry.rgba[3] * 255));
                I.push(i);
                labels.push(entry.name || "");
            }
            return { R, G, B, A, I, labels };
        }

        const legendDiv = document.getElementById('legend');
        Object.entries(labelMap).forEach(([label, info]) => {
            if (label === "0") return;
            const el = document.createElement('span');
            el.innerHTML = `<i style="background:${rgbaToHex(info.rgba)}"></i>${info.name}`;
            legendDiv.appendChild(el);
        });

        const nv = new Niivue({
            backColor: [0, 0, 0, 1],
            show3Dcrosshair: true,
            loadingText: ""
        });
        await nv.attachTo("gl");
        nv.setSliceType(nv.sliceTypeMultiplanar);
        nv.setInterpolation(false);

        const dropzone = document.getElementById('dropzone');
        const opacitySlider = document.getElementById('opacity');
        let ctLoaded = false;
        let segLoaded = false;

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            const canvas = document.getElementById('gl');
            canvas.width = Math.floor(window.innerWidth * dpr);
            canvas.height = Math.floor(window.innerHeight * dpr);
            if (typeof nv.resizeListener === "function") nv.resizeListener();
            nv.drawScene();
        }
        window.addEventListener('resize', resize);
        requestAnimationFrame(resize);
her
        // First file drop is CT
        function isSegmentationFile(name) {
            return /label|seg/i.test(name);
        }

        async function loadFile(file) {
            const url = URL.createObjectURL(file);
            const treatAsSeg = ctLoaded && (isSegmentationFile(file.name) || segLoaded === false);

            if (!ctLoaded && !isSegmentationFile(file.name)) {
                await nv.loadVolumes([{ url, name: file.name, colormap: "gray", opacity: 1 }]);
                ctLoaded = true;
                dropzone.style.display = ctLoaded && segLoaded ? 'none' : 'flex';
                dropzone.querySelector('div').textContent = 'Drop segmentation';
            } else {
                await nv.addVolumeFromUrl({ url, name: file.name, opacity: opacitySlider.value / 100 });
                const segVol = nv.volumes[nv.volumes.length - 1];
                segVol.colormapLabel = cmapper.makeLabelLut(buildLabelColormap());
                nv.updateGLVolume();
                segLoaded = true;
                dropzone.style.display = 'none';
                opacitySlider.classList.add('visible');
                legendDiv.classList.add('visible');
            }
            resize();
        }

        ['dragover', 'dragenter'].forEach(evt =>
            window.addEventListener(evt, e => {
                e.preventDefault();
                dropzone.classList.add('dragging');
            })
        );
        ['dragleave', 'drop'].forEach(evt =>
            window.addEventListener(evt, e => {
                e.preventDefault();
                dropzone.classList.remove('dragging');
            })
        );
        window.addEventListener('drop', async (e) => {
            e.preventDefault();
            const files = Array.from(e.dataTransfer.files);
            for (const file of files) {
                await loadFile(file);
            }
        });
        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = '.nii,.gz';
        fileInput.multiple = true;
        fileInput.style.display = 'none';
        document.body.appendChild(fileInput);
        fileInput.addEventListener('change', async () => {
            for (const file of Array.from(fileInput.files)) {
                await loadFile(file);
            }
        });
        dropzone.style.pointerEvents = 'auto';
        dropzone.style.cursor = 'pointer';
        dropzone.addEventListener('click', () => fileInput.click());

        opacitySlider.addEventListener('input', (e) => {
            const overlayIndex = nv.volumes.length - 1;
            if (overlayIndex < 1) return;
            nv.setOpacity(overlayIndex, e.target.value / 100);
        });
    </script>

</body>

</html>
